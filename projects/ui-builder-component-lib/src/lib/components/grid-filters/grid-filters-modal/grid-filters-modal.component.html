<div #filterDialogRef class="filter-dialog" [ngStyle]="{ 'max-height': filterDialogComponentRect.height < filterDialogRef.offsetHeight ? '80vh' : 'auto' }">
  <div class="filter-dialog__header" cdkDrag cdkDragRootElement=".cdk-overlay-pane" cdkDragHandle>
    <div class="filter-dialog__header-left-group">
      <img src="assets/icons/filter-plus.svg" />
      <div class="filter-dialog__header-text">Filter Group {{ mode === 'edit' ? 'Editor' : 'Creator' }}</div>
    </div>
    <div class="filter-dialog__header-close-button" (click)="handleClickCancel()">
      <img src="assets/icons/grid/transparent-cross.svg" />
    </div>
  </div>

  <div class="filter-dialog__body" #filterDialogBodyRef>
    <form [formGroup]="formGroup" class="d-flex">
      <div #filterDialogBodyFormRowRef formArrayName="UserFilters" class="filter-dailog-body-form-row">
        <ng-container *ngFor="let filter of userFiltersFormControl['controls']; let rowIndex = index">
          <div class="filter-dialog__row--prefix" *ngIf="rowIndex !== 0">and</div>
          <div
            [formGroupName]="rowIndex"
            [ngClass]="{
              extended:
                filter?.controls.publicFieldName?.value?.value &&
                filter?.controls?.operatorType?.value?.value &&
                values[filter?.controls.publicFieldName?.value?.identifier][filter?.controls.operatorType?.value?.identifier]?.length > 0 &&
                values[filter?.controls.publicFieldName?.value?.identifier][filter?.controls.operatorType?.value?.identifier][0]?.length > 0,
            }"
            class="filter-dialog__row"
          >
            <lib-select-filter
              [formFieldControl]="filter?.controls.publicFieldName"
              [options]="options"
              [submitted]="submitted"
              placeholder="Select field"
              class="filter-dialog__row-select-filter"
            >
            </lib-select-filter>
            <lib-select-filter
              [formFieldControl]="filter?.controls?.operatorType"
              [disabled]="!filter?.controls.publicFieldName?.value"
              [options]="operators[filter?.controls.publicFieldName?.value?.identifier]"
              [submitted]="submitted"
              placeholder="Select condition"
              class="filter-dialog__row-select-filter"
            >
            </lib-select-filter>
            <ng-container formArrayName="Values" *ngFor="let valuefilter of filter.get('Values')['controls']; let i = index">
              <ng-container
                [formGroupName]="i"
                *ngIf="
                  filter?.controls.publicFieldName?.value &&
                  filter?.controls?.operatorType?.value &&
                  filter?.controls.publicFieldName?.value?.identifier > -1 &&
                  filter?.controls.operatorType?.value?.identifier > -1 &&
                  values[filter?.controls.publicFieldName?.value?.identifier][filter?.controls.operatorType?.value?.identifier][i]?.length > 0
                "
              >
                <lib-select-filter
                  *ngIf="
                    values[filter?.controls.publicFieldName?.value.identifier][filter?.controls.operatorType?.value.identifier][i][0].identifier === FilterTypeEnum.MultiSelect ||
                    values[filter?.controls.publicFieldName?.value.identifier][filter?.controls.operatorType?.value.identifier][i][0].identifier === FilterTypeEnum.SingleSelect
                  "
                  [formFieldControl]="valuefilter"
                  [disabled]="filter?.controls.operatorType?.value?.value < 0"
                  [options]="values[filter?.controls.publicFieldName?.value.identifier][filter?.controls.operatorType?.value.identifier][i]"
                  [operator]="values[filter?.controls.publicFieldName?.value.identifier][filter?.controls.operatorType?.value.identifier][i][0].identifier2"
                  [multiple]="
                    values[filter?.controls.publicFieldName?.value.identifier][filter?.controls.operatorType?.value.identifier][i][0].identifier === FilterTypeEnum.MultiSelect
                  "
                  [showSelectMessage]="true"
                  [submitted]="submitted"
                  placeholder="Select option"
                  class="filter-dialog__row-select-filter"
                >
                </lib-select-filter>
                <lib-select-filter
                  *ngIf="
                    values[filter?.controls.publicFieldName?.value.identifier][filter?.controls.operatorType?.value.identifier][i][0].identifier ===
                    FilterTypeEnum.AutoCompleteMulti
                  "
                  [formFieldControl]="valuefilter"
                  [disabled]="filter?.controls.operatorType?.value?.value < 0"
                  [options]="values[filter?.controls.publicFieldName?.value.identifier][filter?.controls.operatorType?.value.identifier][i]"
                  [operator]="values[filter?.controls.publicFieldName?.value.identifier][filter?.controls.operatorType?.value.identifier][i][0].identifier2"
                  [multiple]="true"
                  [showSelectMessage]="true"
                  [submitted]="submitted"
                  [backendQueryUrl]="values[filter?.controls.publicFieldName?.value.identifier][filter?.controls.operatorType?.value.identifier][i][0].backendQueryUrl"
                  [getFiltersOptions]="getFiltersOptions"
                  placeholder="Select option"
                  class="filter-dialog__row-select-filter"
                >
                </lib-select-filter>
                <lib-date-filter
                  *ngIf="values[filter?.controls.publicFieldName?.value.identifier][filter?.controls.operatorType?.value.identifier][i][0].identifier === FilterTypeEnum.DateFilter"
                  [formFieldControl]="valuefilter"
                  [rangeSelect]="filter?.controls.operatorType?.value?.value === 'Between'"
                  [dateFormat]="dateFormat"
                  placeholder="Select date"
                  class="filter-dialog__row-select-filter"
                >
                </lib-date-filter>
                <lib-form-field
                  *ngIf="values[filter?.controls.publicFieldName?.value.identifier][filter?.controls.operatorType?.value.identifier][i][0].identifier === FilterTypeEnum.Currency"
                  [formFieldControl]="valuefilter"
                  [currencySymbol]="currencyDisplaySymbol"
                  [hideCents]="true"
                  [ngClass]="{ 'filter-dialog__row-select-filter--multiple': filter?.controls.operatorType?.value?.value === 'Between' }"
                  type="currency"
                  class="filter-dialog__row-select-filter"
                >
                </lib-form-field>
                <lib-form-field
                  *ngIf="values[filter?.controls.publicFieldName?.value.identifier][filter?.controls.operatorType?.value.identifier][i][0].identifier === FilterTypeEnum.Text"
                  [formFieldControl]="valuefilter"
                  [errorInlineMode]="true"
                  type="text"
                  [ngClass]="{ 'filter-dialog__row-select-filter--multiple': filter?.controls.operatorType?.value?.value === 'Between' }"
                  class="filter-dialog__row-select-filter"
                >
                </lib-form-field>
                <lib-form-field
                  *ngIf="values[filter?.controls.publicFieldName?.value.identifier][filter?.controls.operatorType?.value.identifier][i][0].identifier === FilterTypeEnum.Number"
                  [formFieldControl]="valuefilter"
                  type="number"
                  [errorInlineMode]="true"
                  [ngClass]="{ 'filter-dialog__row-select-filter--multiple': filter?.controls.operatorType?.value?.value === 'Between' }"
                  class="filter-dialog__row-select-filter"
                >
                </lib-form-field>
              </ng-container>
            </ng-container>
            <div class="filter-dailog-body-form-row__cross-icon">
              <div class="plus-svg-icon-container" (click)="handleRowDeleted(rowIndex, $event)">
                <ng-container *ngTemplateOutlet="plusIcon; context: { cross: true }"></ng-container>
              </div>
            </div>
          </div>
        </ng-container>
        <div class="filter-dailog-body-form-row__plus-icon">
          <div (click)="addUserFilter()" class="plus-svg-icon-container">
            <ng-container *ngTemplateOutlet="plusIcon; context: { cross: false }"></ng-container>
          </div>
        </div>
      </div>
    </form>
  </div>
  <div class="filter-dialog__footer">
    <div class="filter-dialog__footer__separator-container">
      <ng-container *ngTemplateOutlet="footerSeparator"></ng-container>
    </div>
    <div class="filter-dialog__footer__form-container">
      <form [formGroup]="formGroup">
        <div class="filter-dialog__footer__form-container__form">
          <div class="filter-dialog__body-filter-name">
            <div *ngIf="mode === 'create'" class="filter-dialog__body-filter-name__saved-filter-button">
              <lib-form-field
                class="filter-dialog__body-filter-name__saved-filter-button--checkbox"
                type="checkbox"
                [formFieldControl]="formGroup.controls['SaveFilter']"
              ></lib-form-field>
              <lib-form-field
                class="filter-dialog__body-filter-name__saved-filter-button--radio"
                type="radio"
                [formFieldControl]="deselectableRadioButtonFormControl"
                [options]="[radioCheckbox]"
                [radioDeselectable]="false"
                #saveFilterRadioButton
              ></lib-form-field>
            </div>
            <lib-form-field
              [formFieldControl]="formGroup.controls['Name']"
              [required]="formGroup.controls['SaveFilter'].value"
              [submitted]="formGroup.controls['SaveFilter'].value"
              [invalidPatternMessage]="invalidPatternMessage"
              placeholder="Save for later ?"
              type="text"
              class="filter-dialog__body-field"
            >
            </lib-form-field>
          </div>
        </div>
      </form>
      <div class="form-submission-btn-container">
        <lib-secondary-btn (click)="handleClickCancel()" class="normal-text filter-dialog__cancel-button" aria-label="cancel-details" [type]="'button'">
          {{ 'COMMON.CANCEL' | translate }}
        </lib-secondary-btn>
        <lib-primary-btn
          (click)="handleClickSaveApply()"
          class="normal-text filter-dialog__save-button"
          aria-label="save-details"
          [type]="'submit'"
          *ngIf="mode === 'edit'"
          [disabled]="!formGroup.valid || !formGroupValueChanged"
        >
          {{ 'COMMON.SAVEANDAPPLY' | translate }}
        </lib-primary-btn>
        <lib-primary-btn
          (click)="handleClickSave()"
          class="normal-text filter-dialog__save-button"
          aria-label="save-details"
          [type]="'submit'"
          [disabled]="!formGroup.valid || !formGroupValueChanged"
        >
          <span>{{ applyFilterText }}</span>
        </lib-primary-btn>
      </div>
    </div>
  </div>
</div>

<!-- SVG Icons -->

<ng-template #plusIcon let-cross="cross">
  <ng-container [ngSwitch]="cross">
    <img *ngSwitchCase="true" src="assets/icons/grid/cross.svg" />
    <img *ngSwitchCase="false" src="assets/icons/grid/plus.svg" />
  </ng-container>
</ng-template>

<ng-template #footerSeparator>
  <img src="assets/icons/grid/footer-separator.svg" />
</ng-template>
