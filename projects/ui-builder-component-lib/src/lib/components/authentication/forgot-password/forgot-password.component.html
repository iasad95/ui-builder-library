<ion-content>
  <div class="auth-container" [ngClass]="[customClass]" submitOnEnter (enter)="onSubmit()">
    <form [formGroup]="form" autocomplete="off" libFocusInvalidInput *ngIf="form">
      <div class="center-contents-column">
        <img [src]="icons.logo" width="170" height="80" alt="" class="cyrano-logo" />
        <p class="form-title primary-text">{{ 'AUTH.FORGOT_PASSWORD' | translate }}</p>
        <div class="auth-circle">
          <img [src]="icons?.password.lock" alt="" />
        </div>
        <p class="primary-text">{{ 'AUTH.FORGOT_PASSWORD_ENTER_EMAIL' | translate }}</p>
        <div class="custom-input">
          <lib-input-field type="text" [readonly]="loading | async" formControlName="email" [label]="'FIELDS.EMAIL' | translate" maxLength="500"></lib-input-field>
        </div>
        <lib-error-message class="input-error" [control]="form.controls['email']"></lib-error-message>
      </div>
    </form>
  </div>
</ion-content>
