<ion-content>
  <div class="auth-container" submitOnEnter (enter)="onSubmit()">
    <form [formGroup]="form" (ngSubmit)="onSubmit()" autocomplete="off" libFocusInvalidInput *ngIf="form" id="reset-password-form">
      <div class="center-contents-column">
        <img [src]="icons.logo" class="cyrano-logo" width="170" height="80" alt="" />
        <p class="form-title primary-text">{{ 'AUTH.CREATE_NEW_PASSWORD' | translate }}</p>
        <div class="auth-circle">
          <img [src]="icons?.password.unlock" alt="" />
        </div>
        <p class="primary-text">
          {{ 'AUTH.FORGOT_PASSWORD_ENTER_NEW_PASSWORD' | translate }}
        </p>
        <div class="custom-input">
          <lib-input-field
            [readonly]="loading | async"
            [type]="hide ? 'password' : 'text'"
            formControlName="password"
            customPasswordValidator
            [label]="'FIELDS.PASSWORD' | translate"
          ></lib-input-field>
          <button mat-icon-button [disableRipple]="true" type="button" (click)="hide = !hide" [attr.aria-label]="'Hide password'" [attr.aria-pressed]="hide">
            <mat-icon>{{ hide ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
        </div>
        <lib-error-message class="input-error bottom-space" [customErrorMessage]="form.controls['password'].errors?.message || ''" [control]="form.controls['password']">
        </lib-error-message>

        <div class="custom-input">
          <lib-input-field
            [readonly]="loading | async"
            [type]="confirmPasswordHide ? 'password' : 'text'"
            formControlName="confirmPassword"
            [libConfirmPasswordValidator]="'password'"
            [label]="'FIELDS.CONFIRM_PASSWORD' | translate"
          ></lib-input-field>
          <button
            mat-icon-button
            type="button"
            [disableRipple]="true"
            (click)="confirmPasswordHide = !confirmPasswordHide"
            [attr.aria-label]="'Hide password'"
            [attr.aria-pressed]="confirmPasswordHide"
          >
            <mat-icon>{{ confirmPasswordHide ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
        </div>
        <lib-error-message
          class="input-error"
          [customErrorMessage]="
            form.controls.confirmPassword.value && form.controls.confirmPassword.errors && (form.controls.confirmPassword.touched || form.controls.confirmPassword.dirty)
              ? ('FIELDS.PASSWORD_MUST_MATCH' | translate)
              : ''
          "
          [control]="form.controls['confirmPassword']"
        >
        </lib-error-message>
      </div>
    </form>
  </div>
</ion-content>
