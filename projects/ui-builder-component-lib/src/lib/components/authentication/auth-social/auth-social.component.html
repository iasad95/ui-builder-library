<div class="social-login">
  <lib-icon-btn (click)="socialLogin(providers.GOOGLE)">
    <img [src]="icons?.google" />
  </lib-icon-btn>
  <lib-icon-btn (click)="socialLogin(providers.FACEBOOK)">
    <img [src]="icons?.facebook" />
  </lib-icon-btn>
  <lib-icon-btn (click)="socialLogin(providers.TWITTER)">
    <img [src]="icons?.twitter" />
  </lib-icon-btn>
</div>
