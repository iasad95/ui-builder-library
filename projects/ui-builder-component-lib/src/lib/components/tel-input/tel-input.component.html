<ng-container *ngIf="!freeInputMode; else freeInputTmpl">
  <div class="iti iti--allow-dropdown phone-input" [ngClass]="separateDialCodeClass">
    <div
      class="iti__flag-container"
      #dropDownRef="bs-dropdown"
      dropdown
      [autoClose]="autoClose"
      container="body"
      (onShown)="onDropDownShow()"
      [ngClass]="{ disabled }"
      [isDisabled]="disabled"
      [ngStyle]="{ 'background-image': 'url(' + icons.telInputIcons.countrySelectorImage + ')' }"
    >
      <div class="iti__selected-flag" matRipple dropdownToggle>
        <div class="iti__flag" *ngIf="searchCountryFlag" [ngClass]="selectedCountry.flagClass || ''"></div>
        <div *ngIf="separateDialCode || (!searchCountryFlag && !separateDialCode)" class="selected-dial-code">{{ countryCode }}</div>
        <img src="assets/down-arrow.svg" class="iti__arrow" *ngIf="showDropDownArrow" />
      </div>
      <div *dropdownMenu #dropDownElementRef [attr.width]="focusableElRef?.inputRef.getBoundingClientRect().width" class="dropdown-menu country-dropdown">
        <div class="width-container">
          <div class="search-container" *ngIf="searchCountryField">
            <input
              #inputElement
              id="country-search-box"
              [patterns]="customPatterns"
              mask="A{100}"
              autocomplete="off"
              [(ngModel)]="countrySearchText"
              (keyup)="searchCountry()"
              (click)="$event.stopPropagation()"
              (keydown.arrowDown)="onListFocus()"
              [placeholder]="searchCountryPlaceholder"
              autofocus
            />
          </div>
          <ul appListbox (keydown.enter)="dropDownRef.hide(); inputElement.nativeElement.focus()" role="listbox" class="iti__country-list" #countryList>
            <li
              [appOption]="country"
              class="iti__country iti__standard"
              *ngFor="let country of filteredCountries; trackBy: identify; let i = index"
              (click)="onCountrySelect(country, inputElement.nativeElement, false, $event.isTrusted)"
              (keydown.enter)="onCountrySelect(country, inputElement.nativeElement)"
              [id]="country.htmlId"
            >
              <div class="iti__flag-box">
                <div class="iti__flag" [ngClass]="country.flagClass"></div>
              </div>
              <span class="iti__country-name">{{ country.name }}</span>
              <span class="iti__dial-code">+{{ country.dialCode }}</span>
            </li>
            <li *ngIf="!filteredCountries.length" class="iti__country iti__standard disabled">
              <span class="iti__country-name">No Country found</span>
            </li>
          </ul>
        </div>
      </div>
    </div>
    <div class="input-toggle-container">
      <div
        lib-input-field
        (resized)="onResize($event.newRect.inlineSize)"
        type="tel"
        [id]="inputId"
        autocomplete="off"
        [ngClass]="cssClass"
        (onBlur)="onTouched()"
        (keypress)="onInputKeyPress($event)"
        [(ngModel)]="phoneNumber"
        (ngModelChange)="modelChangeEvent$.next(phoneNumber)"
        [disabled]="disabled"
        [placeholder]="resolvePlaceholder()"
        #inputField
        #ngModelRef="ngModel"
      ></div>
    </div>
  </div>
  <div class="error-outline"></div>
</ng-container>

<ng-template #freeInputTmpl>
  <div class="iti iti--allow-dropdown phone-input" [ngClass]="separateDialCodeClass">
    <div
      lib-input-field
      class="free-inp-mode"
      type="tel"
      [id]="inputId"
      autocomplete="off"
      [ngClass]="cssClass"
      (onBlur)="onTouched()"
      (keypress)="onInputKeyPress($event)"
      [(ngModel)]="phoneNumber"
      (ngModelChange)="onPhoneNumberChange()"
      [disabled]="disabled"
      [mask]="'000000000000000'"
      [prefix]="'+'"
      [attr.maxLength]="maxLength"
      [attr.validation]="phoneValidation"
      #inputField
      #ngModelRef="ngModel"
    ></div>
  </div>
  <div class="error-outline"></div>
</ng-template>
