<div class="primary-chip" [ngStyle]="{ 'border-radius.px': height * 0.5 }">
  <div class="primary-chip__outer-wrapper" [ngStyle]="{ 'border-radius.px': height * 0.5 }">
    <div class="primary-chip__outer-background" [ngStyle]="{ 'border-radius.px': height * 0.5 }"></div>
  </div>
  <div class="primary-chip__inner-wrapper" [ngStyle]="{ 'border-radius.px': height * 0.5 }">
    <div class="primary-chip__inner-background" [ngStyle]="{ 'border-radius.px': height * 0.5 }">
      <img class="primary-chip__inner-image" src="assets/premium-chip/inner-glow.svg" />
    </div>
  </div>
  <div class="primary-chip__border-wrapper" [ngStyle]="{ 'border-radius.px': height * 0.5 }">
    <img class="primary-chip__border-top-image" src="assets/premium-chip/border-top.svg" />
  </div>
  <div class="primary-chip__border-wrapper" [ngStyle]="{ 'border-radius.px': height * 0.5 }">
    <div class="primary-chip__border-container">
      <img class="primary-chip__border-bottom-image" src="assets/premium-chip/border-bottom.svg" />
    </div>
  </div>
</div>
