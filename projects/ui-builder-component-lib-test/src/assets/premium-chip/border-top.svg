<svg xmlns="http://www.w3.org/2000/svg" height="100%" width="100%">
    <rect x="0" y="0" height="3.125%" width="100%" mask="url(#fade-mask-border-top)" fill="rgb(250, 90, 150)" />
    <defs>
    <mask id="fade-mask-border-top">
        <rect x="0" y="0" width="100%" height="3.125%" fill="url(#premium-chip-border-top)" />
    </mask>
    <linearGradient id="premium-chip-border-top" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" style="stop-color: black" />
        <stop offset="10%" style="stop-color: black" />
        <stop offset="30%" style="stop-color: white" />
        <stop offset="70%" style="stop-color: white" />
        <stop offset="90%" style="stop-color: black" />
        <stop offset="100%" style="stop-color: black" />
    </linearGradient>
    </defs>
</svg>
